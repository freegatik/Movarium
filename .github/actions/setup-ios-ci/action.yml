name: Setup iOS CI (Xcode + simulator runtime)
description: Xcode 16.2, first launch, загрузка платформы iOS Simulator — общий блок для build и test.

runs:
  using: composite
  steps:
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "16.2"

    - name: Xcode first launch
      shell: bash
      run: sudo xcodebuild -runFirstLaunch

    - name: Download iOS Simulator platform
      shell: bash
      run: |
        chmod +x .github/scripts/download-ios-platform-ci.sh
        .github/scripts/download-ios-platform-ci.sh
